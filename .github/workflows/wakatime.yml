name: Waka Readme

on:
  schedule:
    - cron: "30 0/4 * * *"
  workflow_dispatch:
jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@6a2ec228c5ab57e173ac03586902a0b06b8f9301
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          COMMIT_USERNAME: heyongqi02
          COMMIT_EMAIL: hi@heyongqi.me
          # 是否展示图表的最后更新日期
          SHOW_UPDATED_DATE: true
          # 是否显示截止今日的代码贡献行数
          SHOW_LINES_OF_CODE: false
          # 是否显示编程时长统计
          SHOW_TOTAL_CODE_TIME: false
          # 是否显示资料页浏览量统计
          SHOW_PROFILE_VIEWS: false
          # 是否显示提交 commit 统计
          SHOW_COMMIT: false
          # 是否显示一周内每日 commit 量情况
          SHOW_DAYS_OF_WEEK: true
          # 是否显示编程语言使用情况
          SHOW_LANGUAGE: false
          # 是否显示系统使用情况
          SHOW_OS: false
          # 是否显示正在研究的项目
          SHOW_PROJECTS: false
          # 是否显示所处的时区
          SHOW_TIMEZONE: false
          # 是否显示编辑器/集成开发环境（IDE）的使用情况
          SHOW_EDITORS: false
          # 是否显示不同编程语言与框架在各个仓库中的占比显示
          SHOW_LANGUAGE_PER_REPO: false
          # 是否显示用户的概述信息
          SHOW_SHORT_INFO: false
          # 是否显示不同年份不同季度的代码贡献行数
          SHOW_LOC_CHART: false
          # 改变进度条的样式
          SYMBOL_VERSION: 2
